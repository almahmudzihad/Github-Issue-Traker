<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Traker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#f8fafc]">
    <header class="bg-[#ffffff] ">
        <nav class="container mx-auto">
            <!-- Navigation content -->
             <div class="flex items-center justify-between py-4">
                <div class="flex items-center">
                    <img src="./assets/github-logo.png" alt="Logo" class="h-8 w-8 mr-2">
                    <span class="text-xl font-semibold">Github Issue Traker</span>
                </div>
                <div>
                    <div class="join">
                    <div>
                        <label class="input validator join-item">
                        <input type="text" placeholder="search issues..." required />
                        </label>
                    </div>
                    <button class="btn bg-[#4a00ff] text-white rounded-md">+ New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="container mx-auto mt-8">
        <div class="btn-container bg-white p-4 mb-4 space-x-2">
            <button id="allBtn" onclick="activeRemove('allBtn')" class="btn bg-[#4a00ff] text-white rounded-md">All</button>
            <button id="openBtn" onclick="activeRemove('openBtn')" class="btn  rounded-md">Open</button>
            <button id="closedBtn" onclick="activeRemove('closedBtn')" class="btn  rounded-md ">Closed</button>
        </div>
        <div class="issues-container flex items-center justify-between mb-4 ">
                <!-- Issues will be dynamically loaded here -->
            <div class="flex items-center ">
                <img src="./assets/Aperture.png" alt="" class="px-4">
                <div>
                    <p class="text-xl font-semibold"><span>0</span> issues</p>
                     <p class="text-[#64748b]">Track and manage your project issues</p>
                </div>
                
            </div>
            <div class="flex items-center gap-4">
              <p><span class="bg-green-500 w-2.5 h-2.5 rounded-full inline-block mr-2"></span>open</p>
                <p><span class="bg-violet-500  w-2.5 h-2.5 rounded-full inline-block mr-2"></span>closed</p>
            </div>
        </div>
        <!-- Main content -->
        <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-4 gap-4 ">
            <!-- Issues will be dynamically loaded here -->
            
        </div>
        <div id="openIssues" class="grid grid-cols-1 md:grid-cols-4 gap-4  mt-4">
            <!-- Open issues will be dynamically loaded here -->
             
        </div>
        
      
       
    </main>
    <script src="./home.js"></script>
    <!-- <script type="module" src="home.js"></script> -->

</body>
</html>
