<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Traker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body >
    <header class="min-h-screen max-w-md bg-white mx-auto">
        
        <div class="text-center">
            <img src="./assets/github-logo.png" alt="" class="inline-block py-8">
            <h1 class="text-2xl font-semibold">Github-Issue-Traker</h1>
            <p class="text-[#68748b]">Sign in to manage your issues</p>
        </div>
        <div>
            <fieldset class="fieldset mx-auto mt-8 w-3/4">
            

            <label class="">Username</label>
            <input id="userName" type="text" class="input w-full" placeholder="Enter Username" />
            <p class="text-[#4a00ff]">Default: admin</p>

            <label class="">Password</label>
            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
            <p class="text-[#4a00ff]">Default: admin123</p>
            <button id="loginBtn" class="btn bg-[#4a00ff] text-white rounded-md ">Login</button>
            
            
            <p class="text-center  mt-2">or</p>
            <p class="text-[#68748b] text-center  mt-2">Demo Credentials:</p>
            <div class="text-center bg-[#f8fafc] py-4  mt-2">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
            </fieldset>
        </div>
        
        
    </header>
    <script src="./login.js"></script>
</body>
</html>
